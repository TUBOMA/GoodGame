<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>イライラ棒ゲーム</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="app">
    <!-- スコアと操作説明を表示する上部エリアです。 -->
    <section class="top-bar" aria-label="ゲーム情報">
      <div class="info-box">
        <span class="label">スコア</span>
        <span id="score" class="value">0</span>
      </div>
      <div class="info-box control-box">
        <span class="label">操作方法</span>
        <span class="control-text">WASD または 矢印キーで移動</span>
      </div>
    </section>

    <!-- ゲーム本体です。壁や障害物はJavaScriptでこの中に生成されます。 -->
    <section class="game-panel" aria-label="イライラ棒ゲーム">
      <div id="gameArea" class="game-area">
        <div id="startZone" class="zone start-zone">START</div>
        <div id="goalZone" class="zone goal-zone">GOAL</div>
        <div id="cursor" class="cursor" aria-hidden="true"></div>
      </div>
    </section>

    <!-- ゲームをやり直すボタンと、ホーム画面へ戻るリンクです。 -->
    <div class="actions">
      <button id="restartButton" type="button">リスタート</button>
      <a class="button-link" href="../index.html">メイン画面へ</a>
    </div>
  </main>

  <script src="script.js"></script>
</body>
</html>
