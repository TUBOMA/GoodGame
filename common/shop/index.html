<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>GOOD GAME - ショップ</title>
  <link rel="stylesheet" href="../main.css">
</head>
<body>
  <header class="navbar">
    <div class="logo">アイテムショップ</div>
    <div class="nav-right">
      <div class="coin-display">所持コイン: <span id="ui-coin">0</span> C</div>
      <a href="../../index.html" class="btn back-btn">◀ ホームに戻る</a>
    </div>
  </header>

  <main class="container">
    <h1 class="page-title">ショップ</h1>
    
    <div class="shop-grid">
      <!--
        ★ポイント：商品を追加したい時は、この div のセットをコピペして
        data-id, data-price, data-name の3つを書き換えるだけでOK！
      -->
      <div class="shop-item" data-id="test_message" data-price="10" data-name="テスト用メッセージ">
        <h3>テスト用メッセージ</h3>
        <p>購入すると、ホーム画面に隠しメッセージが表示されます。</p>
        <div class="price">10 C</div>
        <button class="btn buy-btn">購入する</button>
      </div>

      <div class="shop-item" data-id="icon_beginner" data-price="100" data-name="実績アイコン：初心者">
        <h3>実績アイコン：初心者</h3>
        <p>プロフィールを飾るアイコン。</p>
        <div class="price">100 C</div>
        <button class="btn buy-btn">購入する</button>
      </div>

      <div class="shop-item" data-id="theme_dark" data-price="500" data-name="テーマ：ダークモード">
        <h3>テーマ：ダークモード</h3>
        <p>画面の背景を黒くできる機能。</p>
        <div class="price">500 C</div>
        <button class="btn buy-btn">購入する</button>
      </div>
    </div>
  </main>

  <!-- システムと、ショップ専用のJSを読み込む -->
  <script src="../main.js"></script>
  <script src="./shop.js"></script>
</body>
</html>
